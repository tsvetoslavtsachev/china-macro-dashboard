name: Weekly China Macro Update

on:
  schedule:
    # Всеки понеделник в 06:00 UTC (08:00 Sofia зиме / 09:00 Sofia лете)
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Позволява ръчно стартиране от GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pages: write
      id-token: write
    env:
      # tqdm \r → нов ред в Actions logs; akshare го ползва за heavy fetchers
      TQDM_DISABLE: '1'
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compute cache key
        id: cache-key
        run: echo "key=china-macro-cache-$(date -u +%Y-W%V)" >> "$GITHUB_OUTPUT"

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data/
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            china-macro-cache-

      - name: Smart refresh stale series
        run: python run.py --refresh-only

      - name: Generate HTML briefing
        run: python run.py --briefing --no-browser

      - name: Generate Markdown context
        run: python run.py --export-context --no-browser

      # ── AI-consumption слой (Фаза 4 / C3) ──────────────────────────────────
      - name: Export API JSON (macro_state + series_data)
        run: python export_api.py --years 10

      - name: Assemble latest/ AI bundle (context.md + data.json + manifest.json)
        run: python export/build_latest.py

      - name: Update index.html (latest briefing)
        run: |
          LATEST=$(ls -1t output/briefing_*.html | head -n1)
          if [ -n "$LATEST" ]; then
            cp "$LATEST" output/index.html
            echo "index.html ← $LATEST"
          fi

      - name: Prepare Pages site
        run: |
          mkdir -p _site
          cp output/index.html _site/index.html 2>/dev/null || \
            cp $(ls -1t output/briefing_*.html | head -n1) _site/index.html
          # archive: include all briefings + context md-та
          cp output/briefing_*.html _site/ 2>/dev/null || true
          cp output/briefing_context_*.md _site/ 2>/dev/null || true
          # стабилен /latest/ AI-consumption слой (context.md + data.json + manifest.json + series.json)
          mkdir -p _site/latest _site/api
          cp output/latest/* _site/latest/ 2>/dev/null || true
          cp output/api/macro_state.json output/api/series_data.json _site/api/ 2>/dev/null || true
          ls -la _site/ _site/latest/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Commit and push output
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p output data
          git add output data
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly macro update $(date -u '+%Y-%m-%d')"
            for attempt in 1 2 3 4 5; do
              if git push; then
                echo "Push успешен (опит $attempt)."
                break
              fi
              echo "Push fail-на (опит $attempt) — rebase + retry..."
              git pull --rebase origin main
              sleep $((attempt * 5))
            done
          fi

  deploy:
    needs: update
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
