name: Weekly China Macro Update

on:
  schedule:
    # Всеки понеделник в 06:00 UTC (08:00 Sofia time)
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Позволява ръчно стартиране от GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pandas akshare

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data/
          key: china-macro-cache-${{ github.run_id }}
          restore-keys: |
            china-macro-cache-

      - name: Smart refresh stale series
        run: python run.py --refresh-only

      - name: Generate HTML briefing
        run: python run.py --briefing --no-browser

      - name: Generate Markdown context
        run: python run.py --export-context --no-browser

      - name: Commit and push output
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git add data/
          git diff --staged --quiet || git commit -m "chore: weekly macro update $(date -u '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
